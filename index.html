<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Forge — a scientific computing learning environment for Python and Julia. Master NumPy, SciPy, energy systems modeling, and optimization on the path to MacroEnergy.jl." />
    <meta name="theme-color" content="#0a0e14" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Forge — Scientific Computing Learning Environment" />
    <meta property="og:description" content="Master Python & Julia for scientific computing. 50+ lessons covering NumPy, SciPy, optimization, ODE integration, and energy systems modeling." />
    <meta property="og:url" content="https://lillianwang112.github.io/forge/" />
    <!-- TODO: Add screenshot <meta property="og:image" content="https://lillianwang112.github.io/forge/og-image.png" /> -->

    <link rel="icon" type="image/svg+xml" href="/forge/forge-icon.svg" />
    <title>Forge — Scientific Computing Learning Environment</title>

    <!-- Google Fonts: Instrument Serif (display) + DM Sans (body) + JetBrains Mono (code) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400&family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <!-- SPA routing: restore path after 404.html redirect -->
    <script>
      (function () {
        var redirect = sessionStorage.getItem('spa-redirect');
        if (redirect) {
          sessionStorage.removeItem('spa-redirect');
          var base = '/forge';
          var path = redirect.startsWith(base) ? redirect.slice(base.length) : redirect;
          window.history.replaceState(null, '', base + (path || '/'));
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
