<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Forge</title>
    <script>
      // GitHub Pages SPA redirect: preserve the full path through the 404 redirect
      (function () {
        const repo = '/forge';
        const path = window.location.pathname;
        const search = window.location.search;
        const hash = window.location.hash;
        if (path.startsWith(repo)) {
          const redirect = path + search + hash;
          sessionStorage.setItem('spa-redirect', redirect);
          window.location.replace(repo + '/');
        }
      })();
    </script>
  </head>
  <body></body>
</html>
